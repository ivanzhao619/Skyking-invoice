<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKYKING 税单生成器</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f5f5f7; --card:#ffffff; --ink:#1d1d1f; --sub:#6e6e73;
  --line:#e5e5ea; --blue:#0071e3; --blue-soft:#e8f1fd; --green:#34c759;
  --radius:16px; --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
}
*{box-sizing:border-box}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI","PingFang SC","Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  font-size:15px; line-height:1.5;
}
.topbar{
  position:sticky; top:0; z-index:50;
  background:rgba(255,255,255,.72); backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--line); padding:14px 24px;
  display:flex; align-items:center; gap:18px;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:17px;letter-spacing:.2px}
.brand .logo{width:26px;height:26px}
.seg{margin-left:auto;display:flex;background:#ececf0;border-radius:10px;padding:3px;gap:2px}
.seg button{
  border:0;background:transparent;padding:7px 18px;border-radius:8px;
  font-size:14px;font-weight:500;color:var(--sub);cursor:pointer;transition:.15s;
  font-family:inherit;
}
.seg button.active{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.wrap{max-width:1200px;margin:0 auto;padding:26px 24px 80px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:20px}
h2{font-size:20px;font-weight:600;margin:0 0 4px}
.muted{color:var(--sub);font-size:13.5px}
.hidden{display:none!important}

/* upload */
.drop{
  border:2px dashed #cfd0d6;border-radius:14px;padding:40px 20px;text-align:center;
  cursor:pointer;transition:.2s;background:#fafafc;
}
.drop:hover,.drop.drag{border-color:var(--blue);background:var(--blue-soft)}
.drop .big{font-size:16px;font-weight:500;margin-bottom:6px}
.drop svg{opacity:.5;margin-bottom:8px}

.cols{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:20px}
@media(max-width:900px){.cols{grid-template-columns:1fr}}

.imgbox{position:relative;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fafafc}
.imgbox img{width:100%;display:block;cursor:zoom-in}
.imgbox .cap{padding:8px 12px;font-size:12.5px;color:var(--sub);border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}

/* form */
label{display:block;font-size:12.5px;color:var(--sub);margin:0 0 5px;font-weight:500}
input,select,textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:10px;
  font-size:14px;font-family:inherit;color:var(--ink);background:#fff;transition:.15s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.12)}
.field{margin-bottom:13px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.items table{width:100%;border-collapse:collapse;margin-top:6px}
.items th{font-size:11.5px;color:var(--sub);text-align:left;font-weight:600;padding:0 6px 6px}
.items td{padding:3px 4px}
.items input{padding:7px 8px;font-size:13.5px}
.items td.amt{font-variant-numeric:tabular-nums;font-size:13.5px;padding:0 8px;color:var(--sub)}
.icon-btn{border:0;background:transparent;color:#ff3b30;font-size:18px;cursor:pointer;padding:4px 6px;line-height:1}
.add-row{margin-top:8px;background:var(--blue-soft);color:var(--blue);border:0;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}

.totals{margin-top:14px;border-top:1px solid var(--line);padding-top:12px;font-variant-numeric:tabular-nums}
.totals .r{display:flex;justify-content:space-between;padding:3px 0;font-size:14px}
.totals .r.grand{font-weight:600;font-size:16px;margin-top:4px}

.btnrow{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.btn{border:0;border-radius:11px;padding:11px 20px;font-size:14.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:.15s}
.btn.primary{background:var(--blue);color:#fff}
.btn.primary:hover{background:#0062c4}
.btn.ghost{background:#f0f0f3;color:var(--ink)}
.btn.ghost:hover{background:#e7e7ec}
.btn:disabled{opacity:.5;cursor:default}

/* customer list */
.cust-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.cust-item{border:1px solid var(--line);border-radius:13px;padding:16px;position:relative}
.cust-item h3{margin:0 0 8px;font-size:15.5px;font-weight:600}
.cust-item .kv{font-size:12.5px;color:var(--sub);margin:2px 0}
.cust-item .actions{margin-top:12px;display:flex;gap:8px}
.cust-item .actions button{font-size:12.5px;padding:5px 12px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;font-family:inherit}
.cust-item .actions button.del{color:#ff3b30;border-color:#ffd7d5}

/* status pill */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;padding:5px 12px;border-radius:20px;background:#f0f0f3;color:var(--sub)}
.pill.work{background:#fff4e5;color:#b25b00}
.pill.ok{background:#e6f7ec;color:#1a7f37}
.spin{width:13px;height:13px;border:2px solid #d0d0d5;border-top-color:var(--blue);border-radius:50%;animation:sp 0.7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
.overlay img{max-width:92vw;max-height:92vh;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal{background:#fff;border-radius:18px;box-shadow:var(--shadow);width:min(560px,94vw);max-height:90vh;overflow:auto;padding:24px}
.modal h2{margin-bottom:14px}
.modal .btnrow{justify-content:flex-end;margin-top:18px}

/* ===== printable tax invoice (matches SKYKING template) ===== */
.invoice{
  width:794px;background:#fff;color:#000;padding:26px 30px;
  font-family:Arial,"Helvetica Neue",Helvetica,sans-serif;font-size:12px;line-height:1.32;
}
.inv-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.inv-logo{display:flex;align-items:center;gap:8px}
.inv-logo .txt{font-size:30px;font-weight:800;color:#1ba0e2;letter-spacing:1px}
.inv-tax{font-size:20px;font-weight:800;color:#0a2f7a;letter-spacing:.5px}
.inv-mid{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:8px}
.inv-seller{border:1.5px solid #2b6cb0;border-radius:16px;padding:12px 16px;width:52%;font-size:11px}
.inv-seller .reg{font-size:10.5px;margin-bottom:6px}
.inv-right{width:44%}
.inv-daterow{border:1px solid #000;display:flex}
.inv-daterow>div{flex:1;padding:4px 8px}
.inv-daterow>div:first-child{border-right:1px solid #000}
.inv-daterow .lbl{font-size:9.5px;text-align:center;color:#333}
.inv-daterow .val{text-align:center;font-size:11px;font-weight:600;margin-top:2px}
.inv-buyer{border:1.5px solid #2b6cb0;border-radius:14px;padding:8px 12px;margin-top:8px;text-align:center;font-size:11px}
.inv-buyer .nm{font-weight:700}
.inv-terms{border:1px solid #000;text-align:center;padding:5px;margin:10px auto;width:60%;font-size:10.5px}
.inv-terms .u{text-decoration:underline;font-weight:600}
table.inv-tbl{width:100%;border-collapse:collapse;margin-top:6px}
table.inv-tbl th,table.inv-tbl td{border:1px solid #000;padding:4px 6px;font-size:11px}
table.inv-tbl th{background:#fff;font-weight:600;text-align:left}
table.inv-tbl td.n{text-align:right;font-variant-numeric:tabular-nums}
.inv-sum td{border:1px solid #000;padding:3px 6px;font-size:11px}
.inv-sum .n{text-align:right;font-variant-numeric:tabular-nums}
.inv-boiler{border:1px solid #000;border-top:0;padding:8px 10px;font-size:9.7px;line-height:1.4}
.inv-boiler .c{text-align:center}
.inv-foot{display:flex;justify-content:space-between;margin-top:14px;gap:20px}
.inv-recv{width:52%;font-size:11px}
.inv-recv .ln{border-bottom:1px dotted #666;height:20px;margin-bottom:4px;display:flex;align-items:flex-end}
.inv-recv .ln span{font-size:10px}
.inv-note{font-size:8.6px;color:#333;margin-top:10px;line-height:1.35}
.inv-totbox{border:1.5px solid #2b6cb0;border-radius:14px;padding:12px 16px;width:44%;font-size:11.5px;height:fit-content}
.inv-totbox .r{display:flex;justify-content:space-between;padding:2px 0;font-variant-numeric:tabular-nums}
.inv-totbox .cur{text-align:right;font-size:10.5px;color:#333;margin-top:2px}
.inv-web{text-align:center;font-size:10px;color:#333;margin-top:16px}
.inv-scroll{overflow:auto;border:1px solid var(--line);border-radius:12px;background:#eee;padding:16px;display:flex;justify-content:center}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <svg class="logo" viewBox="0 0 40 40"><ellipse cx="20" cy="27" rx="17" ry="7" fill="#3aa84f"/><circle cx="20" cy="17" r="8" fill="#f5a623"/><path d="M4 27 Q13 15 20 24 Q27 15 36 27 Z" fill="#2f8f43"/></svg>
    <span>SKYKING 税单生成器</span>
  </div>
  <div class="seg">

</div>

<div class="wrap">

<!-- ============ INVOICE TAB ============ -->
<div id="view-invoice">
  <div class="card">
    <h2>上传销售单截图</h2>
    <p class="muted" style="margin:2px 0 16px">销售打印预览截图上传后，自动识别客户并填入税单。识别结果可在右侧修改确认。</p>
    <div id="drop" class="drop">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#8a8a8e" stroke-width="1.6"><path d="M12 16V4m0 0L7 9m5-5l5 5"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
      <div class="big">点击或拖入截图</div>
      <div class="muted">支持 PNG / JPG</div>
      <input type="file" id="file" accept="image/*" class="hidden">
    </div>

    <div id="stage" class="hidden">
      <div class="cols">
        <div>
          <div class="imgbox">
            <img id="preview" alt="截图">
            <div class="cap"><span id="ocrStatus"><span class="pill">待识别</span></span><span>点击图片放大确认</span></div>

          </div>

        <div>
          <div class="field">
            <label>客户（公司全称）</label>
            <select id="custSelect" onchange="onCustChange()"></select>
          </div>
          <div class="row2">
            <div class="field"><label>日期</label><input type="date" id="invDate"></div>
            <div class="field"><label>Reference（自动）</label><input type="text" id="invRef" placeholder="导出时生成"></div>
          </div>

          <div class="items">
            <label>商品明细（VAT 自动计算，无需列入）</label>
            <table>
              <thead><tr><th style="width:44%">Item Description</th><th>Qty</th><th>Unit Price</th><th style="width:22%">Total</th><th style="width:26px"></th></tr></thead>
              <tbody id="itemBody"></tbody>
            </table>
            <button class="add-row" onclick="addItem()">＋ 添加一行</button>

          <div class="totals">

            <div class="r"><span>VAT (15%)</span><span id="tVat">0.00</span></div>
            <div class="r grand"><span>Total (Incl)</span><span id="tIncl">0.00</span></div>
          </div>

          <div class="btnrow" style="margin-top:18px">
            <button class="btn primary" onclick="exportPDF()">导出 PDF</button>
            <button class="btn ghost" onclick="exportExcel()">导出 Excel</button>
            <button class="btn ghost" onclick="showInvoicePreview()">预览税单</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ============ CUSTOMER TAB ============ -->
<div id="view-cust" class="hidden">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div><h2>客户管理</h2><p class="muted" style="margin:2px 0 0">提前录入客户信息，截图识别时自动匹配填入税单。</p></div>
      <button class="btn primary" onclick="openCustForm()">＋ 新增客户</button>
    </div>
    <div class="cust-list" id="custList" style="margin-top:18px"></div>
  </div>
</div>

</div><!-- /wrap -->

<!-- hidden render target for export -->
<div style="position:fixed;left:-99999px;top:0" id="renderMount"></div>

<script>
/* ================= DATA LAYER ================= */
const SELLER = {
  name:"SKYKING®",
  reg:"Registration 2012/135100/07/VAT Registration 4040271209",
  lines:["POSTNET SUITE 88","PRIVATE BAG X19","GARDENVIW","2047","Tel. 011-8300785","skykingsolar@hotmail.com"],
  web:"www.skykingsolar.co.za"
};
const LS_CUST="skyking_customers_v1", LS_SEQ="skyking_refseq_v1";

function seedCustomers(){
  return [{
    id:"cajees",
    name:"Cajees lighting and decor Pty Ltd",
    addr:"43 Rapportryer street\nTrichardt 2300",
    vat:"4920220284",
    reg:"2017/497303/07",
    regDate:"",
    contact:"0176380642",
    aliases:"cajee, v-cajee, cajees, cajee's"
  }];
}
function loadCustomers(){
  try{const r=JSON.parse(localStorage.getItem(LS_CUST));if(Array.isArray(r)&&r.length)return r;}catch(e){}
  const s=seedCustomers(); saveCustomers(s); return s;
}
function saveCustomers(list){localStorage.setItem(LS_CUST,JSON.stringify(list));}

/* ================= PURE LOGIC (tested in Node) ================= */
function money(n){return (Math.round((Number(n)||0)*100)/100).toFixed(2);}
function calcTotals(items){
  const excl=items.reduce((s,it)=>s+(Number(it.qty)||0)*(Number(it.price)||0),0);
  const vat=excl*0.15; return {excl, vat, incl:excl+vat};
}
function pad3(n){return String(n).padStart(3,"0");}
function ymd(dateStr){ // yyyy-mm-dd -> yyyymmdd
  return (dateStr||"").replaceAll("-","");
}
// reference: SK + YYYYMMDD + 3-digit sequence for that day
function buildRef(dateStr, seq){return "SK"+ymd(dateStr)+pad3(seq);}
function nextSeq(seqMap, dateKey){return (seqMap[dateKey]||0)+1;}

// match customer from OCR text using name + aliases
function matchCustomer(text, customers){
  const t=(text||"").toLowerCase();
  let best=null, bestScore=0;
  for(const c of customers){
    const keys=[c.name, ...(c.aliases||"").split(",")].map(s=>s.trim().toLowerCase()).filter(Boolean);
    for(const k of keys){
      if(k.length<3) continue;
      if(t.includes(k) && k.length>bestScore){best=c;bestScore=k.length;}
    }
  }
  return best;
}

const UNITS=/\b(pcs?|mtrs?|mtr|set|sets|roll|rolls|box|boxes|unit|units|kg|pkt|pkts|ea|bag|bags)\b/ig;
// Table-aware parser: only the item region, and each row must satisfy qty*price≈amount.
function parseItems(text){
  const rawLines=(text||"").split(/\r?\n/).map(l=>l.trim());
  let start=0,end=rawLines.length,headerFound=false;
  const hIdx=rawLines.findIndex(l=>/(\bitem\b|品名|\bqty\b|数量|price|单价|amount)/i.test(l));
  if(hIdx>=0){start=hIdx+1;headerFound=true;}
  const fIdx=rawLines.findIndex((l,i)=>i>=start && /(单据备注|^total\b|total to pay|discount|balance|payments|打印时间|^[-–—]{3,})/i.test(l));
  if(fIdx>=0)end=fIdx;
  const region=rawLines.slice(start,end);
  const out=[];
  for(const line of region){
    if(!line) continue;
    if(/\bvat\b/i.test(line)) continue;                 // VAT handled separately
    if(/(discount|balance|payment|total)/i.test(line)) continue;
    const nums=(line.match(/\d+(?:\.\d+)?/g)||[]).map(Number);
    if(nums.length<3) continue;                          // real product row shows qty, price, amount
    let qty=null,price=null;
    for(let i=0;i+2<nums.length;i++){
      const a=nums[i],b=nums[i+1],c=nums[i+2];
      if(b!==0 && Math.abs(a*b-c)<=Math.max(0.5,c*0.02)){qty=a;price=b;break;}
    }
    if(qty===null){ if(!headerFound) continue; qty=nums[nums.length-3];price=nums[nums.length-2]; }
    let desc=line.replace(UNITS,' ').replace(/[|]/g,' ')
      .replace(/(^|[\s(])\d+(?:\.\d+)?%?(?=$|[\s)])/g,' ')
      .replace(/[一-鿿]+/g,'').replace(/[^\x00-\x7F]+/g,' ')
      .replace(/\s{2,}/g,' ').trim();
    if(desc.replace(/[^a-z0-9]/ig,'').length<2) continue;
    if(!qty||qty>1000000) qty=1;
    out.push({desc, qty, price:price||0});
  }
  return out;
}

/* ================= STATE ================= */
let customers=loadCustomers();
let items=[];
let currentImage=null;
let editingCustId=null;

/* ================= TABS ================= */
function switchTab(t){
  document.getElementById('view-invoice').classList.toggle('hidden',t!=='invoice');
  document.getElementById('view-cust').classList.toggle('hidden',t!=='cust');
  document.getElementById('tab-invoice').classList.toggle('active',t==='invoice');
  document.getElementById('tab-cust').classList.toggle('active',t==='cust');
  if(t==='cust') renderCustList();
  if(t==='invoice') refreshCustSelect();
}

/* ================= INVOICE TAB ================= */
const dropEl=document.getElementById('drop'), fileEl=document.getElementById('file');
dropEl.onclick=()=>fileEl.click();
fileEl.onchange=e=>{if(e.target.files[0]) loadImage(e.target.files[0]);};
['dragover','dragenter'].forEach(ev=>dropEl.addEventListener(ev,e=>{e.preventDefault();dropEl.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>dropEl.addEventListener(ev,e=>{e.preventDefault();dropEl.classList.remove('drag');}));
dropEl.addEventListener('drop',e=>{if(e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);});

function loadImage(file){
  const rd=new FileReader();
  rd.onload=()=>{
    currentImage=rd.result;
    document.getElementById('preview').src=currentImage;
    document.getElementById('drop').classList.add('hidden');
    document.getElementById('stage').classList.remove('hidden');
    if(!document.getElementById('invDate').value)
      document.getElementById('invDate').value=new Date().toISOString().slice(0,10);
    refreshCustSelect();
    if(!items.length){items=[{desc:'',qty:1,price:0}];renderItems();}
    rerunOCR();
  };
  rd.readAsDataURL(file);
}
function resetStage(){
  currentImage=null; items=[]; renderItems();
  document.getElementById('drop').classList.remove('hidden');
  document.getElementById('stage').classList.add('hidden');
  document.getElementById('file').value='';
  document.getElementById('invRef').value='';
  setOcr('<span class="pill">待识别</span>');
}
function setOcr(html){document.getElementById('ocrStatus').innerHTML=html;}

function preprocess(dataURL){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const scale=img.width?Math.min(2.2,1700/img.width):1;
      const w=Math.max(1,Math.round(img.width*scale)),h=Math.max(1,Math.round(img.height*scale));
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      const ctx=cv.getContext('2d');ctx.drawImage(img,0,0,w,h);
      try{
        const id=ctx.getImageData(0,0,w,h),d=id.data;
        for(let i=0;i<d.length;i+=4){
          const g=0.3*d[i]+0.59*d[i+1]+0.11*d[i+2];
          const v=g>165?255:(g<115?0:g);
          d[i]=d[i+1]=d[i+2]=v;
        }
        ctx.putImageData(id,0,0);
      }catch(e){}
      res(cv);
    };
    img.onerror=()=>res(null);
    img.src=dataURL;
  });
}
async function rerunOCR(){
  if(!currentImage) return;
  if(typeof Tesseract==='undefined'){setOcr('<span class="pill">OCR 未加载（需联网），可手动选择客户</span>');return;}
  setOcr('<span class="pill work"><span class="spin"></span>识别中…</span>');
  try{
    const cv=await preprocess(currentImage);
    const {data}=await Tesseract.recognize(cv||currentImage,'eng',{});
    const text=data.text||'';
    const c=matchCustomer(text,customers);
    if(c){document.getElementById('custSelect').value=c.id;}
    const parsed=parseItems(text);
    if(parsed.length){items=parsed;renderItems();}
    setOcr(`<span class="pill ${c?'ok':'work'}">${c?'✓ 已匹配客户':'未匹配客户，请手动选择'} · 识别 ${parsed.length} 项，请核对</span>`);
  }catch(err){
    console.error(err);
    setOcr('<span class="pill work">识别失败，请手动填写</span>');
  }
}

function refreshCustSelect(){
  const sel=document.getElementById('custSelect'); if(!sel) return;
  const cur=sel.value;
  sel.innerHTML='<option value="">— 选择客户 —</option>'+

}

function renderItems(){
  const tb=document.getElementById('itemBody');
  tb.innerHTML=items.map((it,i)=>`
    <tr>
      <td><input value="${escapeHtml(it.desc||'')}" oninput="upd(${i},'desc',this.value)"></td>
      <td><input type="number" min="0" value="${it.qty??''}" oninput="upd(${i},'qty',this.value)"></td>
      <td><input type="number" min="0" step="0.01" value="${it.price??''}" oninput="upd(${i},'price',this.value)"></td>

function upd(i,k,v){items[i][k]=v;renderItems();}
function addItem(){items.push({desc:'',qty:1,price:0});renderItems();}
function delItem(i){items.splice(i,1);if(!items.length)items.push({desc:'',qty:1,price:0});renderItems();}

/* ================= REFERENCE NUMBER ================= */
function loadSeqMap(){try{return JSON.parse(localStorage.getItem(LS_SEQ))||{};}catch(e){return{};}}
function assignRef(){
  let ref=document.getElementById('invRef').value.trim();
  if(ref) return ref; // manual override kept
  const date=document.getElementById('invDate').value||new Date().toISOString().slice(0,10);
  const key=ymd(date);
  const map=loadSeqMap();
  const seq=nextSeq(map,key);
  ref=buildRef(date,seq);
  return ref; // committed only on export (commitRef)
}
function commitRef(ref,date){
  const key=ymd(date);
  const map=loadSeqMap();
  const seq=parseInt(ref.slice(-3),10);
  if(!isNaN(seq)) map[key]=Math.max(map[key]||0,seq);
  localStorage.setItem(LS_SEQ,JSON.stringify(map));
}

      <tbody>
        ${rows.map(it=>`<tr><td>${escapeHtml(it.code||'')}</td><td>${escapeHtml(it.desc||'')}</td><td class="n">${Number(it.qty)||0}</td><td class="n">${money(it.price)}</td><td class="n">${money((Number(it.qty)||0)*(Number(it.price)||0))}</td></tr>`).join('')}

      <tr><td style="width:84%">Total (Excl)</td><td class="n">${money(t.excl)}</td></tr>
      <tr><td>VAT (15%)</td><td class="n">${money(t.vat)}</td></tr>

/* ================= PREVIEW ================= */
function showInvoicePreview(){
  const ref=assignRef();
  document.getElementById('invRef').value=ref;
  const node=buildInvoiceNode(ref);
  const ov=document.createElement('div');ov.className='overlay';
  const box=document.createElement('div');box.className='modal';box.style.width='min(860px,96vw)';
  box.innerHTML=`<h2>税单预览</h2><div class="inv-scroll"></div><div class="btnrow"><button class="btn ghost" id="pvClose">关闭</button><button class="btn primary" id="pvPdf">导出 PDF</button></div>`;
  box.querySelector('.inv-scroll').appendChild(node);
  ov.appendChild(box);document.body.appendChild(ov);
  box.querySelector('#pvClose').onclick=()=>ov.remove();
  box.querySelector('#pvPdf').onclick=()=>{ov.remove();exportPDF();};
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
}

/* ================= EXPORT PDF ================= */
async function exportPDF(){
  if(!validateBeforeExport()) return;
  const date=document.getElementById('invDate').value||new Date().toISOString().slice(0,10);
  const ref=assignRef();
  document.getElementById('invRef').value=ref;
  const node=buildInvoiceNode(ref);
  const mount=document.getElementById('renderMount');mount.innerHTML='';mount.appendChild(node);
  try{
    const canvas=await html2canvas(node,{scale:2,backgroundColor:'#ffffff',useCORS:true});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    const pw=210, ph=297, margin=8;
    const iw=pw-margin*2;
    const ih=canvas.height*iw/canvas.width;
    pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',margin,margin,iw,Math.min(ih,ph-margin*2));
    pdf.save(`SKYKING_${ref}.pdf`);
    commitRef(ref,date);
  }catch(e){
    console.error(e);
    // fallback to print
    printFallback(node);
  }finally{ mount.innerHTML=''; }
}
function printFallback(node){
  const w=window.open('','_blank');
  w.document.write('<html><head><title>SKYKING Invoice</title></head><body>'+node.outerHTML+'</body></html>');
  w.document.close();w.focus();setTimeout(()=>w.print(),400);
}

/* ================= EXPORT EXCEL ================= */
function exportExcel(){
  if(!validateBeforeExport()) return;
  const cust=getSelectedCustomer();
  const date=document.getElementById('invDate').value||new Date().toISOString().slice(0,10);
  const ref=assignRef();
  document.getElementById('invRef').value=ref;
  const t=calcTotals(items);
  const rows=items.filter(it=>(it.desc||'').trim()||Number(it.qty)||Number(it.price));
  const aoa=[
    ["SKYKING®","","","TAX INVOICE",""],
    [SELLER.reg],
    ...SELLER.lines.map(l=>[l]),
    [],
    ["Date",date,"Reference",ref],
    ["Bill To",cust?cust.name:""],
    ["Address",cust?cust.addr.replace(/\n/g,', '):""],
    ["VAT",cust?cust.vat:"","Reg",cust?cust.reg:""],
    ["Contact",cust?cust.contact:""],
    [],
    ["Item Code","Item Description","Quantity","Unit Price","Total(Excl)"],
    ...rows.map(it=>[it.code||'',it.desc||'',Number(it.qty)||0,Number(it.price)||0,(Number(it.qty)||0)*(Number(it.price)||0)]),
    [],
    ["","","","Total (Excl)",Number(money(t.excl))],
    ["","","","VAT (15%)",Number(money(t.vat))],
    ["","","","Total (Incl)",Number(money(t.incl))],
    ["","","","Currency","South African Rands"]
  ];
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:14},{wch:32},{wch:10},{wch:12},{wch:14}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Tax Invoice");
  XLSX.writeFile(wb,`SKYKING_${ref}.xlsx`);
  commitRef(ref,date);
}

function validateBeforeExport(){
  if(!getSelectedCustomer()){alert("请先选择客户。");return false;}
  const rows=items.filter(it=>(it.desc||'').trim()&&(Number(it.price)||Number(it.qty)));
  if(!rows.length){alert("请至少填写一条有效的商品明细。");return false;}
  return true;
}

/* ================= CUSTOMER MANAGEMENT ================= */
function renderCustList(){
  const el=document.getElementById('custList');
  el.innerHTML=customers.map(c=>`
    <div class="cust-item">
      <h3>${escapeHtml(c.name)}</h3>
      <div class="kv">${escapeHtml(c.addr.replace(/\n/g,', '))}</div>
      ${c.vat?`<div class="kv">VAT: ${escapeHtml(c.vat)}</div>`:''}
      ${c.reg?`<div class="kv">Reg: ${escapeHtml(c.reg)}</div>`:''}
      ${c.regDate?`<div class="kv">注册时间: ${escapeHtml(c.regDate)}</div>`:''}
      ${c.contact?`<div class="kv">联系: ${escapeHtml(c.contact)}</div>`:''}
      ${c.aliases?`<div class="kv" style="color:#0071e3">别名: ${escapeHtml(c.aliases)}</div>`:''}
      <div class="actions">
        <button onclick="openCustForm('${c.id}')">编辑</button>
        <button class="del" onclick="delCust('${c.id}')">删除</button>
      </div>
    </div>`).join('') || '<p class="muted">还没有客户，点击右上角新增。</p>';
}
function openCustForm(id){
  editingCustId=id||null;
  const c=id?customers.find(x=>x.id===id):{name:'',addr:'',vat:'',reg:'',regDate:'',contact:'',aliases:''};
  const ov=document.createElement('div');ov.className='overlay';ov.id='custOverlay';
  ov.innerHTML=`
    <div class="modal">
      <h2>${id?'编辑客户':'新增客户'}</h2>
      <div class="field"><label>公司全称 *</label><input id="f_name" value="${escapeAttr(c.name)}"></div>
      <div class="field"><label>注册地址（可多行）</label><textarea id="f_addr" rows="2">${escapeHtml(c.addr)}</textarea></div>
      <div class="row2">
        <div class="field"><label>VAT 税号</label><input id="f_vat" value="${escapeAttr(c.vat)}"></div>
        <div class="field"><label>注册号 (Reg)</label><input id="f_reg" value="${escapeAttr(c.reg)}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>注册时间</label><input id="f_regDate" value="${escapeAttr(c.regDate)}" placeholder="如 2017-06"></div>
        <div class="field"><label>联系方式</label><input id="f_contact" value="${escapeAttr(c.contact)}"></div>
      </div>
      <div class="field"><label>截图匹配别名（逗号分隔，如 cajee, v-cajee）</label><input id="f_aliases" value="${escapeAttr(c.aliases)}"></div>
      <div class="btnrow">
        <button class="btn ghost" onclick="closeCustForm()">取消</button>
        <button class="btn primary" onclick="saveCustForm()">保存</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)closeCustForm();});
}
function closeCustForm(){const o=document.getElementById('custOverlay');if(o)o.remove();}
function saveCustForm(){
  const name=document.getElementById('f_name').value.trim();
  if(!name){alert('请填写公司全称');return;}
  const data={
    name,
    addr:document.getElementById('f_addr').value,
    vat:document.getElementById('f_vat').value.trim(),
    reg:document.getElementById('f_reg').value.trim(),
    regDate:document.getElementById('f_regDate').value.trim(),
    contact:document.getElementById('f_contact').value.trim(),
    aliases:document.getElementById('f_aliases').value.trim()
  };
  if(editingCustId){
    const c=customers.find(x=>x.id===editingCustId);Object.assign(c,data);
  }else{
    data.id='c'+Date.now();customers.push(data);
  }
  saveCustomers(customers);closeCustForm();renderCustList();refreshCustSelect();
}
function delCust(id){
  if(!confirm('确定删除该客户？'))return;
  customers=customers.filter(c=>c.id!==id);saveCustomers(customers);renderCustList();refreshCustSelect();
}

/* ================= UTIL ================= */
function escapeHtml(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function escapeAttr(s){return String(s??'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

/* init */
refreshCustSelect();
document.getElementById('invDate').value=new Date().toISOString().slice(0,10);
</script>
