<style>
:root{
  --bg:#f2f2f7; --card:#fff; --ink:#1d1d1f; --sub:#6e6e73; --line:#e3e3e8;
  --blue:#0a84ff; --blue-soft:#e8f2ff; --radius:16px;
  --shadow:0 1px 2px rgba(0,0,0,.05),0 6px 20px rgba(0,0,0,.05);
  --safe-b:env(safe-area-inset-bottom); --safe-t:env(safe-area-inset-top);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{
  background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;font-size:16px;line-height:1.5;
  padding-bottom:calc(66px + var(--safe-b));
}
.header{
  position:sticky;top:0;z-index:40;
  background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--line);
  padding:calc(10px + var(--safe-t)) 18px 12px;
  display:flex;align-items:center;gap:10px;
}
.header .logo{width:26px;height:26px}
.header h1{font-size:18px;font-weight:600;margin:0;letter-spacing:.2px}
.header .sub{font-size:12px;color:var(--sub);margin-left:auto}
.page{padding:16px 15px 24px;max-width:760px;margin:0 auto}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:15px}
h2{font-size:18px;font-weight:600;margin:0 0 4px}
.muted{color:var(--sub);font-size:13px;line-height:1.45}
.hidden{display:none!important}

/* capture buttons */
.cap-row{display:flex;gap:12px;margin-top:14px}
.cap-btn{
  flex:1;border:0;border-radius:14px;padding:18px 10px;cursor:pointer;font-family:inherit;
  background:var(--blue-soft);color:var(--blue);font-size:15px;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:7px;
}
.cap-btn svg{width:26px;height:26px}
.cap-btn.alt{background:#f0f0f4;color:var(--ink)}

.imgbox{position:relative;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fafafc;margin-top:4px}
.imgbox img{width:100%;display:block}
.imgbox .cap{padding:9px 13px;font-size:12px;color:var(--sub);border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}

label{display:block;font-size:12px;color:var(--sub);margin:0 0 6px;font-weight:500}
input,select,textarea{
  width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;
  font-size:16px;font-family:inherit;color:var(--ink);background:#fff;-webkit-appearance:none;appearance:none;
}
select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236e6e73' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 13px center;padding-right:34px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(10,132,255,.15)}
.field{margin-bottom:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

.items .it{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px;position:relative}
.items .it .row2{margin-top:9px}
.items .it .amt{margin-top:9px;font-size:13px;color:var(--sub);font-variant-numeric:tabular-nums;text-align:right}
.items .it .rm{position:absolute;top:8px;right:10px;border:0;background:transparent;color:#ff3b30;font-size:20px;line-height:1;cursor:pointer}
.add-row{margin-top:12px;width:100%;background:var(--blue-soft);color:var(--blue);border:0;padding:13px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

.totals{margin-top:16px;border-top:1px solid var(--line);padding-top:13px;font-variant-numeric:tabular-nums}
.totals .r{display:flex;justify-content:space-between;padding:4px 0;font-size:15px}
.totals .r.grand{font-weight:700;font-size:17px;margin-top:3px}

.btn{border:0;border-radius:14px;padding:15px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
.btn.primary{background:var(--blue);color:#fff}
.btn.ghost{background:#f0f0f4;color:var(--ink)}
.btn.sm{padding:11px;font-size:14px}
.btn:disabled{opacity:.5}
.stack{display:flex;flex-direction:column;gap:10px;margin-top:18px}

/* status pill */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:5px 12px;border-radius:20px;background:#f0f0f4;color:var(--sub)}
.pill.work{background:#fff4e5;color:#b25b00}
.pill.ok{background:#e6f7ec;color:#1a7f37}
.spin{width:12px;height:12px;border:2px solid #d0d0d5;border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* customer cards */
.cust-item{border:1px solid var(--line);border-radius:14px;padding:15px;margin-top:12px}
.cust-item h3{margin:0 0 8px;font-size:16px;font-weight:600}
.cust-item .kv{font-size:12.5px;color:var(--sub);margin:2px 0}
.cust-item .actions{margin-top:12px;display:flex;gap:9px}
.cust-item .actions button{flex:1;font-size:13.5px;padding:9px;border-radius:10px;border:1px solid var(--line);background:#fff;cursor:pointer;font-family:inherit}
.cust-item .actions button.del{color:#ff3b30;border-color:#ffd7d5}

/* bottom tab bar */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:45;
  background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--line);
  display:flex;padding-bottom:var(--safe-b);
}
.tabbar button{
  flex:1;border:0;background:transparent;padding:9px 0 8px;cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--sub);font-size:11px;
}
.tabbar button.active{color:var(--blue)}
.tabbar button svg{width:23px;height:23px}

/* modals */
.sheet{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center}
.sheet .panel{background:#fff;width:100%;max-width:640px;border-radius:20px 20px 0 0;max-height:92vh;overflow:auto;padding:20px 18px calc(20px + var(--safe-b))}
.sheet .grip{width:38px;height:5px;border-radius:3px;background:#d5d5db;margin:0 auto 14px}
.sheet h2{margin-bottom:14px}

.imgview{position:fixed;inset:0;z-index:110;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;padding:14px}
.imgview img{max-width:100%;max-height:100%;border-radius:10px}
.imgview .x{position:absolute;top:calc(14px + var(--safe-t));right:18px;color:#fff;font-size:30px;background:none;border:0}

.invwrap{position:fixed;inset:0;z-index:105;background:#111;display:flex;flex-direction:column}
.invtop{display:flex;gap:10px;padding:calc(10px + var(--safe-t)) 14px 10px;background:#1c1c1e}
.invtop .btn{flex:1}
.invtop .btn.ghost{background:#3a3a3c;color:#fff}
.invscroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;justify-content:flex-start}

/* ===== printable tax invoice (fixed 794px, exported) ===== */
.invoice{width:794px;flex:0 0 auto;background:#fff;color:#000;padding:26px 30px;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.32}
.inv-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.inv-logo{display:flex;align-items:center;gap:8px}
.inv-logo .txt{font-size:30px;font-weight:800;color:#1ba0e2;letter-spacing:1px}
.inv-tax{font-size:20px;font-weight:800;color:#0a2f7a}
.inv-mid{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:8px}
.inv-seller{border:1.5px solid #2b6cb0;border-radius:16px;padding:12px 16px;width:52%;font-size:11px}
.inv-seller .reg{font-size:10.5px;margin-bottom:6px}
.inv-right{width:44%}
.inv-daterow{border:1px solid #000;display:flex}
.inv-daterow>div{flex:1;padding:4px 8px}
.inv-daterow>div:first-child{border-right:1px solid #000}
.inv-daterow .lbl{font-size:9.5px;text-align:center;color:#333}
.inv-daterow .val{text-align:center;font-size:11px;font-weight:600;margin-top:2px}
.inv-buyer{border:1.5px solid #2b6cb0;border-radius:14px;padding:8px 12px;margin-top:8px;text-align:center;font-size:11px}
.inv-buyer .nm{font-weight:700}
.inv-terms{border:1px solid #000;text-align:center;padding:5px;margin:10px auto;width:60%;font-size:10.5px}
.inv-terms .u{text-decoration:underline;font-weight:600}
table.inv-tbl{width:100%;border-collapse:collapse;margin-top:6px}
table.inv-tbl th,table.inv-tbl td{border:1px solid #000;padding:4px 6px;font-size:11px}
table.inv-tbl th{font-weight:600;text-align:left}
table.inv-tbl td.n{text-align:right;font-variant-numeric:tabular-nums}
.inv-sum td{border:1px solid #000;padding:3px 6px;font-size:11px}
.inv-sum .n{text-align:right;font-variant-numeric:tabular-nums}
.inv-boiler{border:1px solid #000;border-top:0;padding:8px 10px;font-size:9.7px;line-height:1.4}
.inv-boiler .c{text-align:center}
.inv-foot{display:flex;justify-content:space-between;margin-top:14px;gap:20px}
.inv-recv{width:52%;font-size:11px}
.inv-recv .ln{border-bottom:1px dotted #666;height:20px;margin-bottom:4px;display:flex;align-items:flex-end}
.inv-recv .ln span{font-size:10px}
.inv-note{font-size:8.6px;color:#333;margin-top:10px;line-height:1.35}
.inv-totbox{border:1.5px solid #2b6cb0;border-radius:14px;padding:12px 16px;width:44%;font-size:11.5px;height:fit-content}
.inv-totbox .r{display:flex;justify-content:space-between;padding:2px 0;font-variant-numeric:tabular-nums}
.inv-totbox .cur{text-align:right;font-size:10.5px;color:#333;margin-top:2px}
.inv-web{text-align:center;font-size:10px;color:#333;margin-top:16px}
</style>
</head>
<body>

<div class="header">
  <svg class="logo" viewBox="0 0 40 40"><ellipse cx="20" cy="27" rx="17" ry="7" fill="#3aa84f"/><circle cx="20" cy="17" r="8" fill="#f5a623"/><path d="M4 27 Q13 15 20 24 Q27 15 36 27 Z" fill="#2f8f43"/></svg>
  <h1>SKYKING 税单</h1>
  <span class="sub" id="hint">开票</span>
</div>

<!-- ===== INVOICE ===== -->
<div id="view-invoice" class="page">
  <div class="card" id="uploadCard">
    <h2>上传销售单</h2>
    <p class="muted" style="margin:4px 0 0">拍照或从相册选销售单截图，自动识别客户与明细，生成税单。</p>
    <div class="cap-row">
      <button class="cap-btn" onclick="camEl.click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        拍照
      </button>
      <button class="cap-btn alt" onclick="albEl.click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        相册
      </button>
    </div>
    <input type="file" id="cam" accept="image/*" capture="environment" class="hidden">
    <input type="file" id="alb" accept="image/*" class="hidden">
  </div>

  <div id="stage" class="hidden">
    <div class="card">
      <div class="imgbox">
        <img id="preview" alt="截图" onclick="zoomImg()">
        <div class="cap"><span id="ocrStatus"><span class="pill">待识别</span></span><span>点图放大核对</span></div>
      </div>
      <div class="row2" style="margin-top:12px">
        <button class="btn ghost sm" onclick="rerunOCR()">重新识别</button>
        <button class="btn ghost sm" onclick="resetStage()">换一张</button>
      </div>
    </div>

    <div class="card">
      <div class="field">
        <label>客户（公司全称）</label>
        <select id="custSelect"></select>
      </div>
      <div class="row2">
        <div class="field"><label>日期</label><input type="date" id="invDate"></div>
        <div class="field"><label>Reference（自动）</label><input type="text" id="invRef" placeholder="导出时生成"></div>
      </div>

      <div class="items">
        <label>商品明细（VAT 自动算，无需列入）</label>
        <div id="itemBody"></div>
        <button class="add-row" onclick="addItem()">＋ 添加一行</button>
      </div>

      <div class="totals">
        <div class="r"><span>Total (Excl)</span><span id="tExcl">0.00</span></div>
        <div class="r"><span>VAT (15%)</span><span id="tVat">0.00</span></div>
        <div class="r grand"><span>Total (Incl)</span><span id="tIncl">0.00</span></div>
      </div>

      <div class="stack">
        <button class="btn primary" onclick="openReview('pdf')">核对并导出 PDF</button>
        <button class="btn ghost" onclick="openReview('excel')">核对并导出 Excel</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== CUSTOMERS ===== -->
<div id="view-cust" class="page hidden">
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h2>客户管理</h2>
      <button class="btn primary sm" style="width:auto;padding:9px 16px" onclick="openCustForm()">＋ 新增</button>
    </div>
    <p class="muted" style="margin:6px 0 0">别名用于截图自动匹配（逗号分隔）。</p>
    <div id="custList"></div>
  </div>
</div>

<!-- bottom tabs -->
<div class="tabbar">
  <button id="tab-invoice" class="active" onclick="switchTab('invoice')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
    开票
  </button>
  <button id="tab-cust" onclick="switchTab('cust')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13A4 4 0 0116 11"/></svg>
    客户
  </button>
</div>

/* ================= PURE LOGIC (tested) ================= */
function money(n){return (Math.round((Number(n)||0)*100)/100).toFixed(2);}
function calcTotals(items){const excl=items.reduce((s,it)=>s+(Number(it.qty)||0)*(Number(it.price)||0),0);const vat=excl*0.15;return{excl,vat,incl:excl+vat};}
function pad3(n){return String(n).padStart(3,"0");}
function ymd(d){return (d||"").replaceAll("-","");}
function buildRef(d,seq){return "SK"+ymd(d)+pad3(seq);}
function nextSeq(map,key){return (map[key]||0)+1;}
function matchCustomer(text,customers){
  const t=(text||"").toLowerCase();let best=null,bs=0;
  for(const c of customers){const keys=[c.name,...(c.aliases||"").split(",")].map(s=>s.trim().toLowerCase()).filter(Boolean);
    for(const k of keys){if(k.length<3)continue;if(t.includes(k)&&k.length>bs){best=c;bs=k.length;}}}
  return best;
}
const UNITS=/\b(pcs?|mtrs?|mtr|set|sets|roll|rolls|box|boxes|unit|units|kg|pkt|pkts|ea|bag|bags)\b/ig;
// Table-aware parser: only the item region, and each row must satisfy qty*price≈amount.
function parseItems(text){
  const rawLines=(text||"").split(/\r?\n/).map(l=>l.trim());
  // 1) locate item table region: header row -> footer row
  let start=0,end=rawLines.length,headerFound=false;
  const hIdx=rawLines.findIndex(l=>/(\bitem\b|品名|\bqty\b|数量|price|单价|amount)/i.test(l));
  if(hIdx>=0){start=hIdx+1;headerFound=true;}
  const fIdx=rawLines.findIndex((l,i)=>i>=start && /(单据备注|^total\b|total to pay|discount|balance|payments|打印时间|^[-–—]{3,})/i.test(l));
  if(fIdx>=0)end=fIdx;
  const region=rawLines.slice(start,end);
  const out=[];
  for(const line of region){
    if(!line)continue;
    if(/\bvat\b/i.test(line))continue;                 // VAT handled separately
    if(/(discount|balance|payment|total)/i.test(line))continue;
    const nums=(line.match(/\d+(?:\.\d+)?/g)||[]).map(Number);
    if(nums.length<3)continue;                          // real product row shows qty, price, amount
    // 2) find qty,price,amount as a consecutive triple where qty*price≈amount
    let qty=null,price=null;
    for(let i=0;i+2<nums.length;i++){
      const a=nums[i],b=nums[i+1],c=nums[i+2];
      if(b!==0 && Math.abs(a*b-c)<=Math.max(0.5,c*0.02)){qty=a;price=b;break;}
    }
    // 3) fallback only when we are confident we're inside a detected table
    if(qty===null){ if(!headerFound) continue; qty=nums[nums.length-3];price=nums[nums.length-2]; }
    // 4) description: English only, strip units/numbers/CJK
    let desc=line.replace(UNITS,' ').replace(/[|]/g,' ')
      .replace(/(^|[\s(])\d+(?:\.\d+)?%?(?=$|[\s)])/g,' ')
      .replace(/[一-鿿]+/g,'').replace(/[^\x00-\x7F]+/g,' ')
      .replace(/\s{2,}/g,' ').trim();
    if(desc.replace(/[^a-z0-9]/ig,'').length<2)continue;
    if(!qty||qty>1000000)qty=1;
    out.push({desc,qty,price:price||0});
  }
  return out;
}

// upscale + grayscale + soft threshold to improve OCR on colored screenshots
function preprocess(dataURL){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const scale=img.width?Math.min(2.2,1700/img.width):1;
      const w=Math.max(1,Math.round(img.width*scale)),h=Math.max(1,Math.round(img.height*scale));
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      const ctx=cv.getContext('2d');ctx.drawImage(img,0,0,w,h);
      try{
        const id=ctx.getImageData(0,0,w,h),d=id.data;
        for(let i=0;i<d.length;i+=4){
          const g=0.3*d[i]+0.59*d[i+1]+0.11*d[i+2];
          const v=g>165?255:(g<115?0:g);
          d[i]=d[i+1]=d[i+2]=v;
        }
        ctx.putImageData(id,0,0);
      }catch(e){/* tainted canvas fallback: use as-is */}
      res(cv);
    };
    img.onerror=()=>res(null);
    img.src=dataURL;
  });
}
async function rerunOCR(){
  if(!currentImage)return;
  if(typeof Tesseract==='undefined'){setOcr('<span class="pill">需联网加载识别，可手动选客户</span>');return;}
  setOcr('<span class="pill work"><span class="spin"></span>识别中…</span>');
  try{
    const cv=await preprocess(currentImage);
    const {data}=await Tesseract.recognize(cv||currentImage,'eng',{});
    const text=data.text||'';
    const c=matchCustomer(text,customers);
    if(c)document.getElementById('custSelect').value=c.id;
    const parsed=parseItems(text);
    if(parsed.length){items=parsed;renderItems();}
    const nOK=c?1:0, iOK=parsed.length;
    setOcr(`<span class="pill ${c?'ok':'work'}">${c?'✓ 已匹配客户':'未匹配客户，请手动选'} · 识别 ${iOK} 项，请核对</span>`);
  }catch(err){console.error(err);setOcr('<span class="pill work">识别失败，请手动填写</span>');}
}

/* ================= REFERENCE ================= */
function loadSeqMap(){try{return JSON.parse(localStorage.getItem(LS_SEQ))||{};}catch(e){return{};}}
function assignRef(){
  let ref=document.getElementById('invRef').value.trim();if(ref)return ref;
  const date=document.getElementById('invDate').value||new Date().toISOString().slice(0,10);
  return buildRef(date,nextSeq(loadSeqMap(),ymd(date)));
}
function commitRef(ref,date){
  const key=ymd(date),map=loadSeqMap(),seq=parseInt(ref.slice(-3),10);
  if(!isNaN(seq))map[key]=Math.max(map[key]||0,seq);
  localStorage.setItem(LS_SEQ,JSON.stringify(map));
}

/* ================= EXPORT ================= */
async function runExportPDF(){
  if(!validate())return;
  const date=document.getElementById('invDate').value||new Date().toISOString().slice(0,10);
  const ref=assignRef();document.getElementById('invRef').value=ref;
  const node=buildInvoiceNode(ref);
  const mount=document.getElementById('renderMount');mount.innerHTML='';mount.appendChild(node);
  try{
    const canvas=await html2canvas(node,{scale:2,backgroundColor:'#ffffff',useCORS:true});
    const {jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');
    const pw=210,ph=297,m=8,iw=pw-m*2,ih=canvas.height*iw/canvas.width;
    pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',m,m,iw,Math.min(ih,ph-m*2));
    pdf.save(`SKYKING_${ref}.pdf`);commitRef(ref,date);
  }catch(e){console.error(e);const w=window.open('','_blank');if(w){w.document.write('<html><body>'+node.outerHTML+'</body></html>');w.document.close();setTimeout(()=>w.print(),400);}else alert('导出失败，请检查网络后重试。');}
  finally{mount.innerHTML='';}
}
function runExportExcel(){
  if(!validate())return;
  const cust=getSelectedCustomer();
  const date=document.getElementById('invDate').value||new Date().toISOString().slice(0,10);
  const ref=assignRef();document.getElementById('invRef').value=ref;
  const t=calcTotals(items);
  const rows=items.filter(it=>(it.desc||'').trim()||Number(it.qty)||Number(it.price));
  const aoa=[["SKYKING®","","","TAX INVOICE",""],[SELLER.reg],...SELLER.lines.map(l=>[l]),[],
    ["Date",date,"Reference",ref],["Bill To",cust?cust.name:""],["Address",cust?cust.addr.replace(/\n/g,', '):""],
    ["VAT",cust?cust.vat:"","Reg",cust?cust.reg:""],["Contact",cust?cust.contact:""],[],
    ["Item Code","Item Description","Quantity","Unit Price","Total(Excl)"],
    ...rows.map(it=>[it.code||'',it.desc||'',Number(it.qty)||0,Number(it.price)||0,(Number(it.qty)||0)*(Number(it.price)||0)]),[],
    ["","","","Total (Excl)",Number(money(t.excl))],["","","","VAT (15%)",Number(money(t.vat))],
    ["","","","Total (Incl)",Number(money(t.incl))],["","","","Currency","South African Rands"]];
  const ws=XLSX.utils.aoa_to_sheet(aoa);ws['!cols']=[{wch:14},{wch:32},{wch:10},{wch:12},{wch:14}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Tax Invoice");
  XLSX.writeFile(wb,`SKYKING_${ref}.xlsx`);commitRef(ref,date);
}
function validate(){
  if(!getSelectedCustomer()){alert("请先选择客户。");return false;}
  const rows=items.filter(it=>(it.desc||'').trim()&&(Number(it.price)||Number(it.qty)));
  if(!rows.length){alert("请至少填写一条有效的商品明细。");return false;}
  return true;
}

/* ================= CUSTOMERS ================= */
function renderCustList(){
  const el=document.getElementById('custList');
  el.innerHTML=customers.map(c=>`
    <div class="cust-item">
      <h3>${escapeHtml(c.name)}</h3>
      <div class="kv">${escapeHtml(c.addr.replace(/\n/g,', '))}</div>
      ${c.vat?`<div class="kv">VAT: ${escapeHtml(c.vat)}</div>`:''}
      ${c.reg?`<div class="kv">Reg: ${escapeHtml(c.reg)}</div>`:''}
      ${c.regDate?`<div class="kv">注册时间: ${escapeHtml(c.regDate)}</div>`:''}
      ${c.contact?`<div class="kv">联系: ${escapeHtml(c.contact)}</div>`:''}
      ${c.aliases?`<div class="kv" style="color:#0a84ff">别名: ${escapeHtml(c.aliases)}</div>`:''}
      <div class="actions"><button onclick="openCustForm('${c.id}')">编辑</button><button class="del" onclick="delCust('${c.id}')">删除</button></div>
    </div>`).join('')||'<p class="muted" style="margin-top:14px">还没有客户，点右上角新增。</p>';
}
function openCustForm(id){
  editingCustId=id||null;
  const c=id?customers.find(x=>x.id===id):{name:'',addr:'',vat:'',reg:'',regDate:'',contact:'',aliases:''};
  const s=document.createElement('div');s.className='sheet';s.id='custSheet';
  s.innerHTML=`<div class="panel"><div class="grip"></div><h2>${id?'编辑客户':'新增客户'}</h2>
    <div class="field"><label>公司全称 *</label><input id="f_name" value="${escapeAttr(c.name)}"></div>
    <div class="field"><label>注册地址（可多行）</label><textarea id="f_addr" rows="2">${escapeHtml(c.addr)}</textarea></div>
    <div class="row2"><div class="field"><label>VAT 税号</label><input id="f_vat" value="${escapeAttr(c.vat)}"></div><div class="field"><label>注册号 Reg</label><input id="f_reg" value="${escapeAttr(c.reg)}"></div></div>
    <div class="row2"><div class="field"><label>注册时间</label><input id="f_regDate" value="${escapeAttr(c.regDate)}" placeholder="如 2017-06"></div><div class="field"><label>联系方式</label><input id="f_contact" value="${escapeAttr(c.contact)}"></div></div>
    <div class="field"><label>截图匹配别名（逗号分隔）</label><input id="f_aliases" value="${escapeAttr(c.aliases)}" placeholder="cajee, v-cajee"></div>
    <div class="stack"><button class="btn primary" onclick="saveCustForm()">保存</button><button class="btn ghost" onclick="closeCustForm()">取消</button></div></div>`;
  document.body.appendChild(s);
  s.addEventListener('click',e=>{if(e.target===s)closeCustForm();});
}
function closeCustForm(){const o=document.getElementById('custSheet');if(o)o.remove();}
function saveCustForm(){
  const name=document.getElementById('f_name').value.trim();if(!name){alert('请填写公司全称');return;}
  const data={name,addr:document.getElementById('f_addr').value,vat:document.getElementById('f_vat').value.trim(),reg:document.getElementById('f_reg').value.trim(),regDate:document.getElementById('f_regDate').value.trim(),contact:document.getElementById('f_contact').value.trim(),aliases:document.getElementById('f_aliases').value.trim()};
  if(editingCustId){Object.assign(customers.find(x=>x.id===editingCustId),data);}else{data.id='c'+Date.now();customers.push(data);}
  saveCustomers(customers);closeCustForm();renderCustList();refreshCustSelect();
}
function delCust(id){if(!confirm('确定删除该客户？'))return;customers=customers.filter(c=>c.id!==id);saveCustomers(customers);renderCustList();refreshCustSelect();}

/* ================= UTIL / INIT ================= */
function escapeHtml(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function escapeAttr(s){return String(s??'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
refreshCustSelect();
document.getElementById('invDate').value=new Date().toISOString().slice(0,10);
</script>
</body>
